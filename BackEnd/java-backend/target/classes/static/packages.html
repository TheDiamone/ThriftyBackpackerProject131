<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All-in-One Booking — TravelEase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #1a365d;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header__back {
      color: #90cdf4;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .header__back:hover { text-decoration: underline; }
    .header__title { font-size: 1.1rem; font-weight: 800; }

    /* ── Page ── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .hero { text-align: center; }
    .hero h1 { font-size: 1.9rem; font-weight: 800; color: #1a365d; margin-bottom: 0.4rem; }
    .hero p  { font-size: 0.95rem; color: #718096; }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.25rem;
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.3rem; }

    .field label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field input {
      padding: 0.5rem 0.6rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
      background: #fafcff;
      transition: border-color 0.15s;
    }
    .field input:focus { outline: none; border-color: #3182ce; }

    .form-actions { display: flex; justify-content: flex-end; }

    .btn {
      padding: 0.6rem 1.6rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      background: #3182ce;
      color: #fff;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:hover:not(:disabled) { background: #2b6cb0; }

    .form-error {
      margin-top: 0.6rem;
      color: #c0392b;
      font-size: 0.85rem;
    }

    /* ── States ── */
    .state {
      text-align: center;
      padding: 3rem 1rem;
      color: #718096;
    }
    .state-icon { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
    .state-hint { font-size: 0.85rem; margin-top: 0.4rem; }

    /* ── Spinner ── */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #3182ce;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result message ── */
    .results-msg {
      font-size: 0.88rem;
      color: #718096;
      text-align: center;
    }

    /* ── Package list ── */
    .pkg-list { display: flex; flex-direction: column; gap: 1rem; }

    .pkg-card { display: flex; flex-direction: column; gap: 0.75rem; }

    .pkg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pkg-badge {
      font-size: 0.75rem;
      font-weight: 700;
      background: #ebf8ff;
      color: #3182ce;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .pkg-provider { font-size: 0.7rem; color: #718096; font-weight: 600; }

    .pkg-costs {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .cost-item { display: flex; flex-direction: column; gap: 0.15rem; }

    .cost-label {
      font-size: 0.72rem;
      color: #718096;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .cost-value { font-size: 1rem; font-weight: 700; color: #2d3748; }

    .cost-item--total { margin-left: auto; text-align: right; }
    .cost-value--total { font-size: 1.25rem; color: #3182ce; }

    .pkg-activities { border-top: 1px solid #e2e8f0; padding-top: 0.6rem; }

    .pkg-activities h4 {
      font-size: 0.75rem;
      font-weight: 700;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    .activity-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .activity-tag {
      font-size: 0.78rem;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 2px 10px;
    }
  </style>
</head>
<body>

<header class="header">
  <a class="header__back" href="http://localhost:5173/">← Back to TravelEase</a>
  <span class="header__title">🎫 All-in-One Booking</span>
</header>

<main class="page">
  <div class="hero">
    <h1>Find Your Perfect Package</h1>
    <p>Real flights + hotels paired within your total budget via RapidAPI binary search.</p>
  </div>

  <!-- Search form -->
  <div class="card">
    <div class="form-grid">
      <div class="field">
        <label for="origin">Origin (IATA)</label>
        <input id="origin" type="text" placeholder="e.g. JFK" maxlength="3" />
      </div>
      <div class="field">
        <label for="destination">Destination (IATA)</label>
        <input id="destination" type="text" placeholder="e.g. LHR" maxlength="3" />
      </div>
      <div class="field">
        <label for="startDate">Departure</label>
        <input id="startDate" type="date" />
      </div>
      <div class="field">
        <label for="endDate">Return</label>
        <input id="endDate" type="date" />
      </div>
      <div class="field">
        <label for="travelers">Travelers</label>
        <input id="travelers" type="number" min="1" max="9" value="1" />
      </div>
      <div class="field">
        <label for="budget">Total Budget (USD)</label>
        <input id="budget" type="number" min="1" value="1500" placeholder="1500" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn" id="searchBtn" onclick="handleSearch()">Search Packages</button>
    </div>
    <p class="form-error" id="formError" style="display:none;"></p>
  </div>

  <!-- Output area -->
  <div id="output"></div>
</main>

<script>
  const API_BASE = window.location.origin + '/api/v1'

  function showError(msg) {
    const el = document.getElementById('formError')
    el.textContent = '⚠️ ' + msg
    el.style.display = 'block'
  }
  function clearError() {
    const el = document.getElementById('formError')
    el.style.display = 'none'
    el.textContent = ''
  }

  async function handleSearch() {
    clearError()
    document.getElementById('output').innerHTML = ''

    const origin      = document.getElementById('origin').value.trim().toUpperCase()
    const destination = document.getElementById('destination').value.trim().toUpperCase()
    const startDate   = document.getElementById('startDate').value
    const endDate     = document.getElementById('endDate').value
    const travelers   = Number(document.getElementById('travelers').value) || 1
    const budget      = Number(document.getElementById('budget').value)

    if (!origin)      { showError('Origin airport code is required (e.g. JFK).'); return }
    if (!destination) { showError('Destination airport code is required (e.g. LHR).'); return }
    if (!startDate)   { showError('Departure date is required.'); return }
    if (!endDate)     { showError('Return date is required.'); return }
    if (budget <= 0)  { showError('Budget must be greater than 0.'); return }

    const btn = document.getElementById('searchBtn')
    btn.disabled = true
    btn.textContent = 'Searching…'

    document.getElementById('output').innerHTML = `
      <div class="state">
        <div class="spinner"></div>
        <p>Finding packages within your $${budget} budget…</p>
      </div>`

    try {
      const res = await fetch(API_BASE + '/search/packages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ destination, startDate, endDate, travelers, budget, origin }),
      })

      const data = await res.json()

      if (!res.ok) {
        const msg = data?.detail || data?.message || `Error ${res.status}`
        throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg))
      }

      renderResults(data, budget)
    } catch (e) {
      document.getElementById('output').innerHTML = `
        <div class="state">
          <span class="state-icon">⚠️</span>
          <p>${escHtml(e.message || 'Package search failed. Please try again.')}</p>
        </div>`
    } finally {
      btn.disabled = false
      btn.textContent = 'Search Packages'
    }
  }

  function renderResults(data, budget) {
    const pkgs = data.packages || []
    const msg  = data.message  || ''

    let html = `<p class="results-msg">${escHtml(msg)}</p>`

    if (pkgs.length === 0) {
      html += `
        <div class="state">
          <span class="state-icon">🔍</span>
          <p>No packages found within your $${budget} budget for this route and dates.</p>
          <p class="state-hint">Try increasing your budget or choosing different dates.</p>
        </div>`
    } else {
      html += '<div class="pkg-list">'
      pkgs.forEach((pkg, i) => {
        const activities = (pkg.activities || [])
          .map(a => `<span class="activity-tag">${escHtml(a)}</span>`)
          .join('')

        html += `
          <div class="card pkg-card">
            <div class="pkg-header">
              <span class="pkg-badge">Package ${i + 1}</span>
              <span class="pkg-provider">${escHtml(pkg.provider || 'RapidAPI')}</span>
            </div>
            <div class="pkg-costs">
              <div class="cost-item">
                <span class="cost-label">✈️ Flight</span>
                <span class="cost-value">$${Number(pkg.flightCost).toFixed(2)}</span>
              </div>
              <div class="cost-item">
                <span class="cost-label">🏨 Hotel</span>
                <span class="cost-value">$${Number(pkg.hotelCost).toFixed(2)}</span>
              </div>
              <div class="cost-item cost-item--total">
                <span class="cost-label">Total</span>
                <span class="cost-value cost-value--total">$${Number(pkg.totalCost).toFixed(2)}</span>
              </div>
            </div>
            ${activities ? `
            <div class="pkg-activities">
              <h4>🎯 Suggested Activities</h4>
              <div class="activity-tags">${activities}</div>
            </div>` : ''}
          </div>`
      })
      html += '</div>'
    }

    document.getElementById('output').innerHTML = html
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
  }
</script>
</body>
</html>
