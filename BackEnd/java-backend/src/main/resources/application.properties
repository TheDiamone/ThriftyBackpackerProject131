spring.config.import=optional:file:.env[.properties]
# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database (PostgreSQL) ──────────────────────────────────────────────────────
# Start PostgreSQL with: docker compose up -d
# Override any value via environment variable.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/thriftybackpacker}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── RapidAPI ───────────────────────────────────────────────────────────────────
# Set RAPIDAPI_KEY in your environment or .env before running.
rapidapi.key=${RAPIDAPI_KEY:}
rapidapi.base-host=booking-com.p.rapidapi.com
rapidapi.timeout-ms=30000
# Successful responses cached for 10 min; repeated identical searches skip RapidAPI.
rapidapi.cache-ttl-ms=${RAPIDAPI_CACHE_TTL_MS:600000}
# 429 rate-limit state cached for 2 min; prevents hammering a rate-limited endpoint.
rapidapi.rate-limit-ttl-ms=${RAPIDAPI_RATE_LIMIT_TTL_MS:120000}

# ── Search result caps ────────────────────────────────────────────────────────
travel.api.max-packages=20
travel.api.max-flights=20

# ── Activities / Attractions ───────────────────────────────────────────────────
# Set TRAVEL_API_USE_MOCK=true to return static curated data without calling RapidAPI.
travel.api.use-mock=${TRAVEL_API_USE_MOCK:false}
# If RapidAPI fails or returns empty, serve static fallback instead of an error.
travel.api.activities.fallback-enabled=${TRAVEL_API_ACTIVITIES_FALLBACK_ENABLED:true}
# Maximum activities returned to the frontend. Docs specify 5 (exceeds the required minimum of 3).
travel.api.activities.max-results=${TRAVEL_ACTIVITIES_MAX_RESULTS:5}
# Flight/hotel endpoints now force USD when calling RapidAPI so price comparisons are valid.
# travel.api.max-flight-price is superseded by the ratio-based approach below; kept for reference.
travel.api.max-flight-price=0
# System-enforced budget ceiling (USD). Used by PackageSearchService and the split below.
travel.api.budget-cap=6000.00
# Budget split ratios — maxFlightUsd = budget-cap * flight-ratio, maxHotelUsd = budget-cap * hotel-ratio.
travel.api.budget-flight-ratio=0.40
travel.api.budget-hotel-ratio=0.60

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://agenta.local:5173,http://agentb.local:5173

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.thriftybackpacker=INFO
