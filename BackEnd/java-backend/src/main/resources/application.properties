spring.config.import=optional:file:.env[.properties]
# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ───────────────────────────────────────────────────────────────────
# Default: H2 in-memory (no install required for local dev).
# Production override: set DATABASE_URL=jdbc:postgresql://host:5432/dbname
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:thriftydb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 browser console (dev only — disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── RapidAPI ───────────────────────────────────────────────────────────────────
# Set RAPIDAPI_KEY in your .env or environment before running.
# Endpoints return 503 Service Unavailable if the key is absent.
rapidapi.key=${RAPIDAPI_KEY:}
rapidapi.base-host=booking-com.p.rapidapi.com
rapidapi.timeout-ms=30000

# ── Package Search ────────────────────────────────────────────────────────────
# Maximum number of packages returned by POST /api/v1/search/packages
travel.api.max-packages=10

# ── CORS ──────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins.
# The Vue dev server runs on 5173; agenta/agentb are multi-tenant local hostnames.
app.cors.allowed-origins=http://localhost:5173,http://agenta.local:5173,http://agentb.local:5173

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=alpha
